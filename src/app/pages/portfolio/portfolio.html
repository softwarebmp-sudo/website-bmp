<section class="tp-project-area tp-project-bottom-color p-relative pt-120 pb-90">
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="tp-project-tab-button masonary-menu flex-wrap mb-70">
          <button class="active" data-filter="*"><span>Show all</span></button>
          <button data-filter=".cat2"><span>Architecture</span></button>
          <button data-filter=".cat3"><span>Interior design</span></button>
          <button data-filter=".cat4"><span>Residance</span></button>
        </div>
      </div>
    </div>

    <div class="row grid">
      <div class="col-lg-4 col-md-6 grid-item cat2 cat4 cat5" *ngFor="let portfolio of portfolioList">
        <div class="tp-project-item p-relative fix mb-30">
          <div class="tp-project-thumb p-relative fix">
            <a [routerLink]="['/portfolio', portfolio.id]">
              <img [src]="getPortfolioCoverUrl(portfolio)" [alt]="portfolio.name">
            </a>
          </div>

          <div class="tp-project-item-content p-relative">
            <span>{{ portfolio.category }}</span>
            <h4 class="tp-project-item-title">
              <a [routerLink]="['/portfolio', portfolio.id]">{{ portfolio.name }}</a>
            </h4>
            <div class="tp-project-item-btn">
              <a [routerLink]="['/portfolio', portfolio.id]">
                <span>
                  <i class="fa-regular fa-plus"></i>
                </span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
