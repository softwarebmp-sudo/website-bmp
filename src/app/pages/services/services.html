<main>

   <!-- pricing area start -->
   <section class="tp-pricing-area p-relative pt-120 pb-90">
      <div class="container">
         <div class="row">
            <div class="col-lg-12">
               <div class="tp-pricing-title-wrapper text-center mb-65">
                  <span class="tp-section-title-pre">Nuestros servicios</span>
                  <h3 class="tp-section-title">Nuestros servicios</h3>
               </div>
            </div>
         </div>
         <div class="row">
            <div class="col-lg-4 col-md-6" *ngFor="let service of servicesList">
               <div class="tp-pricing-item p-relative mb-30 wow fadeInUp" data-wow-duration="1s" data-wow-delay=".3s">
                  <div class="shape-bg">
                     <img src="assets/img/counter/pricing-1-shape2.png" alt="">
                  </div>
                  <div class="tp-pricing-head">
                     <h4 class="tp-pricing-tag">{{service.name}}</h4>
                     <span>{{service.description}}</span>
                  </div>
                  <div class="tp-pricing-btn">
                     <a class="tp-btn tp-icon-style w-100 text-center" routerLink="/contact">Solicitar cotización <span><svg
                              class="qodef-svg--custom-arrow qodef-m-arrow" xmlns="http://www.w3.org/2000/svg"
                              width="14.2" height="14.2" viewBox="0 0 14.2 14.2">
                              <g>
                                 <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                 <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                              </g>
                              <g>
                                 <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                 <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                              </g>
                           </svg></span></a>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </section>
   <!-- pricing area end -->
       <!-- contact area start -->
    <section class="tp-contact-area p-relative fix pt-190 pb-200">
        <div class="tp-contact-bg" data-background="assets/img/contact/contact-1-bg.jpg"></div>
        <div class="container">
            <div class="row">
                <div class="col-lg-7">
                    <div class="tp-contact-title-wrapper p-relative wow fadeInLeft" data-wow-duration="1s"
                        data-wow-delay=".3s">
                        <span class="tp-section-title-pre">CONTÁCTANOS</span>
                        <h3 class="tp-section-title">¿Tienes un proyecto en mente?</h3>

                        <div class="tp-contact-btn-box">
                            <a class="tp-btn tp-icon-style" routerLink="/contact">Contáctanos <span><svg
                                        class="qodef-svg--custom-arrow qodef-m-arrow" xmlns="http://www.w3.org/2000/svg"
                                        width="14.2" height="14.2" viewBox="0 0 14.2 14.2">
                                        <g>
                                            <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                            <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                        </g>
                                        <g>
                                            <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                            <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                        </g>
                                    </svg></span></a>
                            <a class="tp-btn tp-icon-style white" routerLink="/contact">“Solicitar cotización <span><svg
                                        class="qodef-svg--custom-arrow qodef-m-arrow" xmlns="http://www.w3.org/2000/svg"
                                        width="14.2" height="14.2" viewBox="0 0 14.2 14.2">
                                        <g>
                                            <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                            <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                        </g>
                                        <g>
                                            <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                            <path d="M13.2 9V1h-8M13.4.8.7 13.5"></path>
                                        </g>
                                    </svg></span></a>
                        </div>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="tp-contact-thumb">
                        <img class="shape-main" src="assets/img/contact/contact-1-1.png" alt="">
                        <img class="shape-1" src="assets/img/contact/contact-1-shape1.png" alt="">
                        <img class="shape-2" src="assets/img/contact/contact-1-shape2.png" alt="">
                        <img class="shape-3" src="assets/img/contact/contact-1-shape3.png" alt="">
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- contact area end -->
</main>
